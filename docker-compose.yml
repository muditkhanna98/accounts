services:
  accounts:
    image: muditkhanna98/accounts:v1
    container_name: accounts-ms
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - mudit-network

  loans:
    image: muditkhanna98/loans:v1.0.0
    container_name: loans-ms
    ports:
      - "8090:8090"
    deploy:
      resources:
        limits:
          memory: 700m
    networks:
      - mudit-network

networks:
  mudit-network:
    driver: bridge
    ipam:
      driver: default
