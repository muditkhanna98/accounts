server:
  port: 8080
spring:
  rabbitmq:
    host: "localhost"
    port: 5672
    username: "guest"
    password: "guest"

  application:
    name: "accounts"

  profiles:
    active: "prod"

  config:
    import: "optional:configserver:http://localhost:8071/"

  datasource:
    url: jdbc:mysql://localhost:3306/accountsdb
    username: root
    password: root

  sql:
    init:
      mode: always

  jpa:
    show-sql: true


management:
  endpoints:
    web:
      exposure:
        include: "*"